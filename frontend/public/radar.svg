<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.3"/>
  <!-- middle ring -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <!-- center dot -->
  <circle cx="16" cy="16" r="3" fill="#22c55e"/>
  <!-- radar sweep -->
  <path d="M16 16 L16 2 A14 14 0 0 1 28.1 22Z" fill="#06b6d4" opacity="0.25"/>
  <!-- pulse blip -->
  <circle cx="22" cy="10" r="2" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
